{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="mb-1">{{ titulo }}</h1>
        <p class="text-muted mb-0">{{ obra.nome_obra }}</p>
    </div>
    <a href="{% url 'historico_financeiro' obra.id %}" class="btn btn-secondary">Voltar</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Data de referencia</label>
                    {{ form.data_referencia }}
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tipo</label>
                    {{ form.tipo }}
                </div>
                <div class="col-md-4">
                    <label class="form-label">Valor</label>
                    {{ form.valor }}
                </div>
                <div class="col-12">
                    <label class="form-label">Descricao</label>
                    {{ form.descricao }}
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-info">Salvar movimentacao</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
